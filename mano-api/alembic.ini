# ─────────────────────────────────────────────────────────────────────────
# Alembic configuration for MANO backend
# ─────────────────────────────────────────────────────────────────────────
# The sqlalchemy.url value is intentionally *empty* here — env.py reads the
# live URL from core.config.settings at runtime, so the same migrations work
# in dev (localhost MySQL), CI (ephemeral), and production without edits.
#
# Common commands (run from mano-api/ repo root):
#   alembic revision --autogenerate -m "add voice_journals table"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history
# ─────────────────────────────────────────────────────────────────────────

[alembic]
script_location = alembic
sqlalchemy.url =
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_path_separator = os
prepend_sys_path = .

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
